  wakelock_plus: ^1.3.1
  flutter_launcher_icons: ^0.13.1
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  receive_sharing_intent: ^1.8.0
  uni_links: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
