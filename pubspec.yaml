publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.9.0
  percent_indicator: ^4.2.3
  reorderables: ^0.6.0
